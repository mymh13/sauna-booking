<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/sauna/v2/" />
    <title>Logga in - Sauna Booking v2</title>
    <link rel="stylesheet" href="css/site.css" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body class="sb-shell">
    <div id="site-nav" hx-get="fragments/nav" hx-trigger="load" hx-swap="outerHTML">
        <header class="sb-topbar">
            <div class="container sb-topbar-inner">
                <div>
                    <div class="sb-eyebrow">Sauna Booking v2</div><a class="sb-brand" href="/sauna/v2/">Dyviksudds
                        bastuflotte</a>
                </div>
            </div>
        </header>
    </div>

    <main class="container py-4">
        <section class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card sb-card">
                    <div class="card-body p-4 p-md-5">
                        <div class="sb-eyebrow mb-2">Inloggning</div>
                        <h1 class="h3 mb-3">Logga in för att boka</h1>

                        <form method="post" hx-post="actions/login" hx-target="#login-result" hx-swap="innerHTML">
                            <div class="mb-3">
                                <label class="form-label" for="username">Användarnamn</label>
                                <input class="form-control" id="username" name="Username" autocomplete="username" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="password">Lösenord</label>
                                <input class="form-control" id="password" name="Password" type="password"
                                    autocomplete="current-password" />
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn sb-btn-primary" type="submit">Logga in</button>
                                <a class="btn btn-outline-secondary" href="index.html">Tillbaka</a>
                            </div>
                        </form>

                        <div id="login-result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
